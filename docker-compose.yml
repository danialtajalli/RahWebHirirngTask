version: "3.8"

services:

  app:
    build: .
    container_name: laravel_app
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    volumes:
      - .:/var/www
    environment:
      APP_NAME: Laravel
      APP_ENV: local
      APP_KEY: base64:cg6Ky6H1OXYFbtIISfvWW5mrplfpJFTqkSOSXdw2y/g=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000

      LOG_CHANNEL: stack

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: laravel

      CACHE_DRIVER: file
      QUEUE_CONNECTION: database

      SANCTUM_STATEFUL_DOMAINS: localhost,127.0.0.1,127.0.0.1:8000, localhost:8000
      SESSION_DOMAIN: null
      SESSION_DRIVER: cookie

    command: >
      sh -c "
      sleep 10 &&
      php artisan migrate --force &&
      php artisan db:seed --force || true &&
      php artisan serve --host=0.0.0.0 --port=8000
      "

  queue:
    build: .
    restart: always
    depends_on:
        - mysql
    volumes:
        - .:/var/www
    environment:
        DB_CONNECTION: mysql
        APP_KEY: base64:cg6Ky6H1OXYFbtIISfvWW5mrplfpJFTqkSOSXdw2y/g=
        DB_HOST: mysql
        DB_PORT: 3306
        DB_DATABASE: laravel
        DB_USERNAME: laravel
        DB_PASSWORD: laravel
        QUEUE_CONNECTION: database
    command: >
        sh -c "
        sleep 20 &&
        php artisan queue:work --tries=3 --timeout=90
        "

  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: always
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
